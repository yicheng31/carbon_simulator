<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24 hour carbon simulator</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="welcome-modal" id="welcomeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h1>碳足跡日常</h1>
            </div>
            <div class="modal-body">
                <p class="modal-subtitle">24 小時碳排放體驗</p>
                <div class="feature-list">
                    <div class="feature-item">
                        <div class="feature-icon">🌍</div>
                        <p>選擇日常生活方式</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">📊</div>
                        <p>實時查看碳排放數據</p>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💡</div>
                        <p>了解環保生活的影響</p>
                    </div>
                </div>
                <p class="modal-description">透過回答 5 個簡單問題，認識到你的日常選擇如何影響地球。每一個決定都會影響碳排放量和環境壓力。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-button" id="startBtn">開始體驗</button>
            </div>
        </div>
    </div>
    <main class="page-scroll">
        <section class="scroll-section question-section question-step-1">
            <div class="question-card">
                <div class="question-meta">1 / 5</div>
                <h2 class="question-title">早餐要吃什麼？</h2>
                <table class="question-table">
                    <tr>
                        <td><button type="button" class="option-button" data-question="1" data-carbon="0.35" data-pressure="1.2">吐司</button></td>
                        <td><button type="button" class="option-button" data-question="1" data-carbon="0.42" data-pressure="1.5">飯糰</button></td>
                    </tr>
                </table>
            </div>
        </section>

        <section class="scroll-section question-section question-step-2">
            <div class="question-card">
                <div class="question-meta">2 / 5</div>
                <h2 class="question-title">中午搭什麼交通工具？</h2>
                <table class="question-table">
                    <tr>
                        <td><button type="button" class="option-button" data-question="2" data-carbon="0.18" data-pressure="0.9">公車</button></td>
                        <td><button type="button" class="option-button" data-question="2" data-carbon="0.12" data-pressure="0.7">捷運</button></td>
                    </tr>
                </table>
            </div>
        </section>

        <section class="scroll-section question-section question-step-3">
            <div class="question-card">
                <div class="question-meta">3 / 5</div>
                <h2 class="question-title">晚餐要吃什麼？</h2>
                <table class="question-table">
                    <tr>
                        <td><button type="button" class="option-button" data-question="3" data-carbon="1.35" data-pressure="2.3">火鍋</button></td>
                        <td><button type="button" class="option-button" data-question="3" data-carbon="0.65" data-pressure="1.1">便當</button></td>
                    </tr>
                </table>
            </div>
        </section>

        <section class="scroll-section question-section question-step-4">
            <div class="question-card">
                <div class="question-meta">4 / 5</div>
                <h2 class="question-title">下午要喝什麼？</h2>
                <table class="question-table">
                    <tr>
                        <td><button type="button" class="option-button" data-question="4" data-carbon="0.45" data-pressure="1.8">手搖茶</button></td>
                        <td><button type="button" class="option-button" data-question="4" data-carbon="0.05" data-pressure="0.2">自帶水</button></td>
                    </tr>
                </table>
            </div>
        </section>

        <section class="scroll-section question-section question-step-5">
            <div class="question-card">
                <div class="question-meta">5 / 5</div>
                <h2 class="question-title">晚上休閒怎麼過？</h2>
                <table class="question-table">
                    <tr>
                        <td><button type="button" class="option-button" data-question="5" data-carbon="1.00" data-pressure="1.4">看電影</button></td>
                        <td><button type="button" class="option-button" data-question="5" data-carbon="0.08" data-pressure="0.3">在家讀書</button></td>
                    </tr>
                </table>
            </div>
        </section>    
    </main>
    <script src="script.js"></script>
</body>
</html>
