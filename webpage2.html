以下是簡化為五題的碳足跡模擬器，並移除所有多餘特效。
```html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Carbon Life · 24H 碳足跡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f5f5f5;
      color: #1e1e1e;
      font-family: system-ui, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
      line-height: 1.5;
      padding: 1.5rem;
      max-width: 700px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #aaa;
      padding-bottom: 0.5rem;
      margin-bottom: 2rem;
    }
    .logo {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .header-stats {
      display: flex;
      gap: 1.8rem;
    }
    .hstat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .hstat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #555;
    }
    .hstat-value {
      font-weight: 700;
      font-size: 1.1rem;
    }
    button {
      background: #ddd;
      border: 1px solid #888;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;

      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #ccc;
    }
    .start-btn {
      background: #2c7a4d;
      color: white;
      border-color: #1f5c38;

      font-size: 1rem;
    }
    .hero {
      text-align: center;
      padding: 2rem 0;
    }
    .hero-title {
      font-size: 2.8rem;
      font-weight: 800;

    .hero-sub {
      margin: 0.8rem auto 1.8rem;
      color: #333;
      max-width: 450px;
    }
    .quiz-section {
      display: none;

    .q-card {
      background: white;
      border: 1px solid #ccc;

    }
    .q-meta {
      font-size: 0.8rem;
      color: #444;

      font-size: 1.2rem;
      font-weight: 700;

    }
    .q-desc {
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 1rem;

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;

    .opt-btn {
      background: white;
      border: 1px solid #bbb;
      text-align: left;
      padding: 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .opt-btn.selected {
      border: 2px solid #2c7a4d;
      background: #f0f7f0;
    }
    .opt-icon {
      font-size: 1.3rem;
    }
    .opt-label {
      font-weight: 700;
      font-size: 0.9rem;
    }
    .opt-carbon {
      font-size: 0.8rem;
      color: #2c7a4d;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: #ddd;
      align-self: flex-start;
    }
    .badge-low {
      background: #c8e6c9;
      color: #1b4d1f;
    }
    .badge-mid {
      background: #fff3cd;
      color: #856404;
    }
    .badge-high {
      background: #f8d7da;
      color: #721c24;
    }
    .result-section {
      display: none;
    }
    .result-header {
      border-bottom: 2px solid #aaa;
      padding-bottom: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .result-score {
      font-size: 3.5rem;
      font-weight: 800;
    }
    .compare-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .compare-label {
      width: 90px;
      font-weight: 600;
    }
    .compare-bar-wrap {
      flex: 1;
      height: 18px;
      background: #e0e0e0;
      border: 1px solid #aaa;
    }
    .compare-bar-fill {
      height: 100%;
      background: #2c7a4d;
      width: 0%;
    }
    .compare-value {
      min-width: 65px;
      text-align: right;
    }
    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.8rem;
      margin: 1rem 0;
    }
    .breakdown-item {
      background: white;
      border: 1px solid #ccc;
      padding: 0.8rem;
      border-radius: 4px;
    }
    .data-box {
      background: #f0f0f0;
      border-left: 4px solid #2c7a4d;
      padding: 0.8rem;
      margin: 1.5rem 0;
      font-size: 0.75rem;
    }
    .restart-btn {
      background: #444;
      color: white;
    }
    @media (max-width: 480px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">◈ Carbon Life</div>
  <div class="header-stats">
    <div class="hstat">
      <span class="hstat-label">累積排放</span>
      <span class="hstat-value" id="h-carbon">—</span>
    </div>
    <div class="hstat">
      <span class="hstat-label">進度</span>
      <span class="hstat-value" id="h-progress">0/5</span>
    </div>
  </div>
</header>

<!-- 首頁 -->
<section class="hero" id="hero-section">
  <div style="color:#2c7a4d; font-weight:600;">24H 碳足跡模擬器</div>
  <h1 class="hero-title">CARBON LIFE</h1>
  <p class="hero-sub">五個日常選擇，計算你一天的碳足跡，並與台灣及全球平均比較。</p>
  <button class="start-btn" onclick="startQuiz()">開始模擬</button>
</section>

<!-- 測驗區 -->
<section class="quiz-section" id="quiz-section"></section>

<!-- 結果區 -->
<section class="result-section" id="result-section">
  <div class="result-header">
    <div style="color:#2c7a4d; font-weight:600;">你的24H碳足跡報告</div>
    <div>
      <span class="result-score" id="r-score">0.00</span> <span>kg CO₂e / 日</span>
    </div>
    <div style="font-size:1.3rem; font-weight:700; margin-top:0.4rem;" id="r-verdict"></div>
    <p id="r-desc" style="color:#333;"></p>
  </div>

  <h3>與基準比較</h3>
  <div class="compare-grid" id="compare-grid"></div>

  <h3>排放來源</h3>
  <div class="breakdown-grid" id="breakdown-grid"></div>

  <div class="data-box">
    <strong>數據來源：</strong>環境部碳足跡係數資料庫、經濟部能源署112年電力係數(0.494 kgCO₂/度)、交通部運具調查。
  </div>
  <button class="restart-btn" onclick="location.reload()">↺ 重新模擬</button>
</section>

<script>
  (function() {
    // 簡化為5題，涵蓋交通、飲食、用電、消費、旅遊
    const questions = [
      {
        id: 1,
        category: "交通",
        icon: "🚗",
        title: "今天主要通勤方式？",
        desc: "以單程10公里計算，不同交通工具碳排差距可達數十倍。",
        options: [
          { label: "步行 / 腳踏車", icon: "🚲", kg: 0.0, badge: "low", note: "0.00 kg" },
          { label: "捷運 / 公車", icon: "🚇", kg: 0.40, badge: "low", note: "0.40 kg" },
          { label: "機車 (燃油)", icon: "🛵", kg: 0.68, badge: "mid", note: "0.68 kg" },
          { label: "獨自開車", icon: "🚗", kg: 1.73, badge: "high", note: "1.73 kg" }
        ]
      },
      {
        id: 2,
        category: "飲食",
        icon: "🍱",
        title: "午餐選擇？",
        desc: "蔬食便當約1.0 kgCO₂e，葷食便當平均約3.25 kgCO₂e。",
        options: [
          { label: "素食 / 蔬食", icon: "🥗", kg: 1.00, badge: "low", note: "1.00 kg" },
          { label: "雞肉 / 豬肉", icon: "🍗", kg: 2.00, badge: "mid", note: "2.00 kg" },
          { label: "牛肉料理", icon: "🍜", kg: 3.25, badge: "high", note: "3.25 kg" },
          { label: "進口牛排", icon: "🥩", kg: 5.00, badge: "high", note: "5.00 kg" }
        ]
      },
      {
        id: 3,
        category: "用電",
        icon: "💡",
        title: "空調 / 家電使用？",
        desc: "電力係數0.494 kgCO₂/度。冷氣溫度設定影響耗電量。",
        options: [
          { label: "不開冷氣", icon: "🍃", kg: 0.10, badge: "low", note: "0.10 kg" },
          { label: "26°C 搭配電扇", icon: "🌀", kg: 0.42, badge: "low", note: "0.42 kg" },
          { label: "22°C 開整天", icon: "❄️", kg: 2.77, badge: "mid", note: "2.77 kg" },
          { label: "長時間高耗電", icon: "⚡", kg: 4.20, badge: "high", note: "4.20 kg" }
        ]
      },
      {
        id: 4,
        category: "消費",
        icon: "🛍️",
        title: "今天有購物嗎？",
        desc: "一件快時尚衣物碳排約1.6 kg，新手機生產碳排約70 kg (均攤每日)。",
        options: [
          { label: "沒有購物", icon: "🙅", kg: 0.00, badge: "low", note: "0.00 kg" },
          { label: "二手物品", icon: "♻️", kg: 0.10, badge: "low", note: "0.10 kg" },
          { label: "一件新衣服", icon: "👕", kg: 1.60, badge: "mid", note: "1.60 kg" },
          { label: "新手機 (日均)", icon: "📱", kg: 8.00, badge: "high", note: "8.00 kg" }
        ]
      },
      {
        id: 5,
        category: "旅遊",
        icon: "✈️",
        title: "近期有旅遊計畫嗎？",
        desc: "火車0.06 kg/人公里；長程飛機碳排極高，均攤至每日。",
        options: [
          { label: "沒有旅遊", icon: "🏡", kg: 0.00, badge: "low", note: "0.00 kg" },
          { label: "台鐵島內", icon: "🚆", kg: 0.60, badge: "low", note: "0.60 kg" },
          { label: "日本來回", icon: "🛫", kg: 3.00, badge: "mid", note: "3.00 kg" },
          { label: "歐美長途", icon: "🌏", kg: 7.00, badge: "high", note: "7.00 kg" }
        ]
      }
    ];

    const answers = {};

    function updateHeader() {
      const total = Object.values(answers).reduce((s, a) => s + a.kg, 0);
      const count = Object.keys(answers).length;
      document.getElementById('h-carbon').textContent = total.toFixed(2) + ' kg';
      document.getElementById('h-progress').textContent = `${count}/5`;
    }

    function buildQuiz() {
      const section = document.getElementById('quiz-section');
      section.innerHTML = '';
      questions.forEach((q) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `qcard-${q.id}`;
        card.innerHTML = `
          <div class="q-meta">${q.icon} ${q.category} · 問題 ${q.id}/5</div>
          <div class="q-title">${q.title}</div>
          <div class="q-desc">${q.desc}</div>
          <div class="options-grid">
            ${q.options.map(opt => `
              <button class="opt-btn" data-qid="${q.id}" data-kg="${opt.kg}" data-icon="${opt.icon}" data-cat="${q.category}">
                <span class="badge ${opt.badge==='low'?'badge-low':opt.badge==='mid'?'badge-mid':'badge-high'}">${opt.badge==='low'?'低碳':opt.badge==='mid'?'中碳':'高碳'}</span>
                <span class="opt-icon">${opt.icon}</span>
                <span class="opt-label">${opt.label}</span>
                <span class="opt-carbon">${opt.note}</span>
              </button>
            `).join('')}
          </div>
        `;
        section.appendChild(card);
      });

      document.querySelectorAll('.opt-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const qId = parseInt(this.dataset.qid);
          const kg = parseFloat(this.dataset.kg);
          const icon = this.dataset.icon;
          const category = this.dataset.cat;
          const card = document.getElementById(`qcard-${qId}`);

          card.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          answers[qId] = { kg, icon, category };
          updateHeader();

          if (Object.keys(answers).length === questions.length) {
            setTimeout(showResult, 200);
          }
        });
      });
    }

    function startQuiz() {
      document.getElementById('hero-section').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      buildQuiz();
      window.scrollTo(0, 0);
    }

    function showResult() {
      document.getElementById('quiz-section').style.display = 'none';
      document.getElementById('result-section').style.display = 'block';

      const total = Object.values(answers).reduce((s, a) => s + a.kg, 0);
      document.getElementById('r-score').textContent = total.toFixed(2);

      let verdict, desc;
      if (total < 4) {
        verdict = "🍀 低碳生活";
        desc = "你的碳足跡遠低於平均，非常環保。";
      } else if (total < 10) {
        verdict = "🌍 接近平均";
        desc = "與台灣人均排放接近，仍有改善空間。";
      } else if (total < 16) {
        verdict = "⚠️ 偏高";
        desc = "碳足跡明顯高於平均，建議檢視高碳選項。";
      } else {
        verdict = "🔥 極高碳排";
        desc = "碳排放量驚人，請從飲食與交通開始調整。";
      }
      document.getElementById('r-verdict').textContent = verdict;
      document.getElementById('r-desc').textContent = desc;

      // 比較基準
      const benchmarks = [
        { label: '你今天', kg: total },
        { label: '台灣平均', kg: 14.0 },
        { label: '全球平均', kg: 11.5 },
        { label: '巴黎目標', kg: 3.0 }
      ];
      const maxKg = Math.max(...benchmarks.map(b => b.kg), 1);
      document.getElementById('compare-grid').innerHTML = benchmarks.map(b => `
        <div class="compare-row">
          <span class="compare-label">${b.label}</span>
          <div class="compare-bar-wrap">
            <div class="compare-bar-fill" style="width:${(b.kg/maxKg)*100}%;"></div>
          </div>
          <span class="compare-value">${b.kg.toFixed(1)} kg</span>
        </div>
      `).join('');

      // 分類統計
      const catMap = {};
      Object.values(answers).forEach(a => {
        catMap[a.category] = (catMap[a.category] || 0) + a.kg;
      });
      document.getElementById('breakdown-grid').innerHTML = Object.entries(catMap)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, kg]) => `<div class="breakdown-item"><strong>${cat}</strong><br>${kg.toFixed(2)} kg</div>`)
        .join('');

      window.scrollTo(0, 0);
    }

    window.startQuiz = startQuiz;
  })();
</script>
</body>
</html>
```
